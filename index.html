<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Мир после — погода</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: 'Google Sans', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      color: #f1f3f4;
      padding: 16px 12px 32px;
    }

    .weather-app {
      max-width: 500px;
      margin: 0 auto;
    }

    /* шапка */
    .app-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0 16px;
      margin-bottom: 8px;
    }
    .app-bar h1 {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.2px;
      color: #e8eaed;
    }
    .date {
      font-size: 14px;
      color: #9aa0a6;
    }

    /* главная карточка температуры */
    .main-weather-card {
      background: #1e1e1e;
      border-radius: 32px;
      padding: 24px 20px;
      margin-bottom: 24px;
      text-align: center;
      box-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .big-temp {
      font-size: 72px;
      font-weight: 500;
      letter-spacing: -4px;
      line-height: 1.1;
    }
    .condition-text {
      font-size: 20px;
      margin-top: 8px;
      color: #e8eaed;
    }
    .high-low {
      font-size: 16px;
      color: #9aa0a6;
      margin-top: 12px;
    }

    /* детали */
    .weather-details {
      display: flex;
      justify-content: space-between;
      background: #1e1e1e;
      border-radius: 48px;
      padding: 12px 16px;
      margin-bottom: 24px;
      gap: 8px;
    }
    .detail-item {
      flex: 1;
      text-align: center;
    }
    .detail-label {
      font-size: 12px;
      color: #9aa0a6;
      margin-bottom: 4px;
    }
    .detail-value {
      font-size: 16px;
      font-weight: 500;
    }

    /* навигация дням */
    .day-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 16px 0 20px;
    }
    .day-arrow {
      background: #1e1e1e;
      border: none;
      font-size: 28px;
      padding: 8px 20px;
      border-radius: 48px;
      color: white;
      cursor: pointer;
      transition: 0.1s;
    }
    .day-arrow:active {
      background: #333;
    }
    .selected-date {
      font-size: 18px;
      font-weight: 500;
      background: #1e1e1e;
      padding: 8px 24px;
      border-radius: 48px;
    }

    /* заголовок секции */
    .section-title {
      font-size: 14px;
      font-weight: 500;
      margin: 8px 0 12px;
      color: #9aa0a6;
      letter-spacing: 0.3px;
    }

    /* карточки районов */
    .raions-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 28px;
    }
    .raion-card {
      background: #1e1e1e;
      border-radius: 28px;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.1s;
    }
    .raion-card:active {
      background: #2c2c2c;
    }
    .raion-name {
      font-size: 17px;
      font-weight: 500;
    }
    .raion-temp {
      font-size: 26px;
      font-weight: 500;
    }
    .raion-icon {
      font-size: 28px;
      margin-right: 12px;
    }
    .raion-detail {
      display: flex;
      align-items: center;
    }

    /* почасовой прогноз */
    .hourly-section {
      margin-top: 8px;
      margin-bottom: 24px;
    }
    .hourly-scroll {
      overflow-x: auto;
      white-space: nowrap;
      display: flex;
      gap: 14px;
      padding-bottom: 6px;
    }
    .hour-card {
      background: #1e1e1e;
      border-radius: 28px;
      padding: 12px 16px;
      min-width: 70px;
      text-align: center;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
    }
    .hour-time {
      font-size: 14px;
      color: #9aa0a6;
    }
    .hour-temp {
      font-size: 20px;
      font-weight: 500;
      margin: 6px 0 2px;
    }
    .hour-icon {
      font-size: 22px;
    }
    .hour-rain {
      font-size: 11px;
      color: #8ab4f8;
    }

    .loading {
      text-align: center;
      padding: 24px;
      color: #9aa0a6;
    }

    .hidden {
      display: none;
    }

    footer {
      text-align: center;
      font-size: 11px;
      color: #5a5a5a;
      margin-top: 32px;
    }
  </style>
</head>
<body>
<div class="weather-app">
  <div class="app-bar">
    <h1>🎙️ Мир после</h1>
    <div class="date" id="liveDate"></div>
  </div>

  <div class="main-weather-card">
    <div class="big-temp" id="mainTemp">--°</div>
    <div class="condition-text" id="mainCondition">--</div>
    <div class="high-low" id="highLow"></div>
  </div>

  <div class="weather-details">
    <div class="detail-item">
      <div class="detail-label">ощущается</div>
      <div class="detail-value" id="feelsLike">--°</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">ветер</div>
      <div class="detail-value" id="wind">-- м/с</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">влажность</div>
      <div class="detail-value" id="humidity">--%</div>
    </div>
  </div>

  <div class="day-nav">
    <button class="day-arrow" id="prevDay">←</button>
    <span class="selected-date" id="selectedDate">СЕГОДНЯ</span>
    <button class="day-arrow" id="nextDay">→</button>
  </div>

  <div class="section-title">ПОГОДА В РАЙОНАХ</div>
  <div class="raions-grid" id="raionsContainer"></div>

  <div id="hourlyBlock" class="hourly-section hidden">
    <div class="section-title" id="hourlyTitle">ПОЧАСОВО</div>
    <div class="hourly-scroll" id="hourlyContainer"></div>
  </div>

  <footer>Мир после… мы ещё живы. А вы?</footer>
</div>

<script>
  const RAIONS = ["Прикубанский", "Нагорный", "Крылатское", "Черёмушки", "Солнечный", "Советский"];
  let currentWeatherData = null;
  let hourlyCache = {};

  function updateLiveDate() {
    const now = new Date();
    const day = now.getDate().toString().padStart(2,'0');
    const month = (now.getMonth()+1).toString().padStart(2,'0');
    const year = now.getFullYear();
    document.getElementById("liveDate").innerText = `${day}.${month}.${year}`;
  }

  function getWeatherIcon(weatherType) {
    const map = {
      "Солнечно": "☀️", "Дождь": "🌧️", "Туман": "🌫️",
      "Гроза": "⛈️", "Аномальная жара": "🔥", "Аномальный холод": "❄️"
    };
    return map[weatherType] || "🌡️";
  }

  function generateHourlyForecast(baseTemp) {
    const now = new Date();
    const currentHour = now.getHours();
    const hourly = [];
    for (let i = 0; i < 10; i++) {
      let hour = (currentHour + i) % 24;
      let timeLabel = hour.toString().padStart(2, '0') + ":00";
      let tempChange = 0;
      if (hour >= 14 && hour <= 17) tempChange = +2;
      else if (hour >= 22 || hour <= 5) tempChange = -3;
      let temp = Math.round(baseTemp + tempChange);
      let icon = temp < 12 ? "🌧️" : (temp < 18 ? "⛅" : "☀️");
      let rain = temp < 12 ? "70%" : (temp < 18 ? "30%" : "10%");
      hourly.push({ time: timeLabel, temp: temp, icon: icon, rain: rain });
    }
    return hourly;
  }

  function renderHourlyForRaion(raionName) {
    if (!currentWeatherData) return;
    const raionTemp = currentWeatherData.raions[raionName].temp;
    const cacheKey = `${raionTemp}_${raionName}`;
    if (hourlyCache[cacheKey]) {
      document.getElementById("hourlyTitle").innerHTML = `📅 ПОЧАСОВО (${raionName})`;
      document.getElementById("hourlyBlock").classList.remove("hidden");
      document.getElementById("hourlyContainer").innerHTML = hourlyCache[cacheKey];
      return;
    }
    const hourly = generateHourlyForecast(raionTemp);
    let html = "";
    for (let h of hourly) {
      html += `
        <div class="hour-card">
          <div class="hour-time">${h.time}</div>
          <div class="hour-temp">${h.temp}°</div>
          <div class="hour-icon">${h.icon}</div>
          <div class="hour-rain">${h.rain}</div>
        </div>
      `;
    }
    document.getElementById("hourlyTitle").innerHTML = `📅 ПОЧАСОВО (${raionName})`;
    document.getElementById("hourlyBlock").classList.remove("hidden");
    document.getElementById("hourlyContainer").innerHTML = html;
    hourlyCache[cacheKey] = html;
  }

  function renderRaions() {
    if (!currentWeatherData) return;
    const container = document.getElementById("raionsContainer");
    container.innerHTML = "";
    for (let raion of RAIONS) {
      const r = currentWeatherData.raions[raion];
      const icon = getWeatherIcon(r.weather);
      const card = document.createElement("div");
      card.className = "raion-card";
      card.innerHTML = `
        <div class="raion-name">${raion}</div>
        <div class="raion-detail">
          <span class="raion-icon">${icon}</span>
          <span class="raion-temp">${r.temp}°</span>
        </div>
      `;
      card.addEventListener("click", () => { renderHourlyForRaion(raion); });
      container.appendChild(card);
    }
  }

  function renderMainData() {
    if (!currentWeatherData) return;
    document.getElementById("mainTemp").innerHTML = currentWeatherData.mainTemp + "°";
    document.getElementById("mainCondition").innerHTML = currentWeatherData.weatherType;
    document.getElementById("highLow").innerHTML = `↑${currentWeatherData.mainTemp+3}° / ↓${currentWeatherData.mainTemp-4}°`;
    document.getElementById("feelsLike").innerHTML = (currentWeatherData.mainTemp-1) + "°";
    document.getElementById("wind").innerHTML = "3 м/с";
    document.getElementById("humidity").innerHTML = "47%";
    renderRaions();
  }

  function loadWeatherData() {
    fetch('data/weather.json?t=' + new Date().getTime())
      .then(res => { if (!res.ok) throw new Error(); return res.json(); })
      .then(data => {
        currentWeatherData = data;
        renderMainData();
      })
      .catch(() => {
        document.getElementById("raionsContainer").innerHTML = '<div class="loading">⚠️ Не удалось загрузить погоду. Попробуйте позже.</div>';
      });
  }

  updateLiveDate();
  loadWeatherData();
</script>
</body>
</html>
