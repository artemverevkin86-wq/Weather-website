<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мир после — погода и события</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: -apple-system, 'Inter', 'Segoe UI', system-ui, sans-serif; color: #ffffff; padding: 20px 16px 40px; }
        .weather-app { max-width: 500px; margin: 0 auto; background: #0f0f0f; border-radius: 48px; padding: 24px 22px 32px; border: 1px solid #2a2a2a; }
        .location-bar { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 32px; color: #bcbcbc; font-size: 14px; border-bottom: 0.5px solid #2c2c2c; padding-bottom: 12px; }
        .city { font-weight: 600; color: #e2e2e2; }
        .main-temp-block { text-align: center; margin-bottom: 28px; }
        .big-temp { font-size: 84px; font-weight: 300; letter-spacing: -4px; line-height: 1; }
        .condition { font-size: 22px; font-weight: 400; margin-top: 6px; color: #dddddd; }
        .high-low { font-size: 15px; color: #aaa; margin-top: 10px; }
        .details-row { display: flex; justify-content: space-between; background: #161616; border-radius: 44px; padding: 14px 20px; margin-bottom: 28px; }
        .detail-item { text-align: center; flex: 1; }
        .detail-label { color: #8e8e8e; font-size: 12px; margin-bottom: 4px; }
        .detail-value { font-weight: 500; }
        .day-nav { display: flex; justify-content: space-between; align-items: center; margin: 24px 0 16px; }
        .day-arrow { background: #1c1c1c; border: none; font-size: 26px; padding: 6px 18px; border-radius: 50px; color: white; cursor: pointer; }
        .selected-date { font-weight: 500; font-size: 18px; background: #1a1a1a; padding: 8px 20px; border-radius: 40px; }
        .raions-title { font-size: 14px; font-weight: 500; margin: 12px 0 12px 0; color: #aaa; }
        .raions-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }
        .raion-card { background: #161616; border-radius: 28px; padding: 16px 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.1s ease; }
        .raion-card:active { background: #252525; }
        .raion-name { font-weight: 500; }
        .raion-temp { font-size: 22px; font-weight: 500; }
        .raion-icon { font-size: 28px; margin: 0 8px; }
        .raion-detail { display: flex; align-items: center; gap: 12px; }
        .hourly-section { margin-top: 8px; margin-bottom: 20px; }
        .hourly-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: #d4a373; }
        .hourly-scroll { overflow-x: auto; white-space: nowrap; display: flex; gap: 20px; padding-bottom: 8px; }
        .hour-card { display: inline-flex; flex-direction: column; align-items: center; background: #141414; padding: 10px 14px; border-radius: 32px; min-width: 70px; }
        .hour-time { font-size: 13px; color: #bcbcbc; }
        .hour-temp { font-size: 20px; font-weight: 500; margin: 6px 0 2px; }
        .hour-icon { font-size: 20px; }
        .hour-rain { font-size: 11px; color: #70b9ff; }
        .events-block { background: #1a1512; border-radius: 28px; padding: 16px 18px; margin: 16px 0 8px; }
        .events-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: #d4a373; letter-spacing: 1px; }
        .event-item { padding: 8px 0; border-bottom: 1px solid #2c241f; font-size: 13px; line-height: 1.4; display: flex; gap: 10px; }
        .event-item:last-child { border-bottom: none; }
        .event-icon { font-size: 16px; color: #d4a373; min-width: 24px; }
        .event-text { color: #ddd0c0; }
        .event-raion { color: #d4a373; font-weight: 500; }
        .no-events { padding: 12px 0; text-align: center; color: #8a7a6a; font-style: italic; font-size: 13px; }
        .hidden { display: none; }
        footer { text-align: center; font-size: 10px; color: #4f4f4f; margin-top: 28px; }
    </style>
</head>
<body>
<div class="weather-app">
    <div class="location-bar">
        <span class="city">🎙️ МИР ПОСЛЕ</span>
        <span class="date" id="liveDate"></span>
    </div>

    <div class="main-temp-block">
        <div class="big-temp" id="mainTemp">22°</div>
        <div class="condition" id="mainCondition">Ясно</div>
        <div class="high-low" id="highLow">↑24° / ↓12°</div>
    </div>

    <div class="details-row">
        <div class="detail-item"><div class="detail-label">ощущается</div><div class="detail-value" id="feelsLike">21°</div></div>
        <div class="detail-item"><div class="detail-label">ветер</div><div class="detail-value" id="wind">3 м/с</div></div>
        <div class="detail-item"><div class="detail-label">влажность</div><div class="detail-value" id="humidity">47%</div></div>
    </div>

    <div class="day-nav">
        <button class="day-arrow" id="prevDay">←</button>
        <span class="selected-date" id="selectedDate">СЕГОДНЯ</span>
        <button class="day-arrow" id="nextDay">→</button>
    </div>

    <div class="raions-title">ПОГОДА В РАЙОНАХ</div>
    <div class="raions-grid" id="raionsContainer"></div>

    <div id="hourlyBlock" class="hourly-section hidden">
        <div class="hourly-title" id="hourlyTitle">📅 ПОЧАСОВО</div>
        <div class="hourly-scroll" id="hourlyContainer"></div>
    </div>

    <div class="events-block">
        <div class="events-title">📻 ПОСЛЕДНИЕ СОБЫТИЯ</div>
        <div id="eventsList"></div>
    </div>

    <footer>Мир после… сводка каждые 00:00 МСК</footer>
</div>

<script>
    // ========== ДАННЫЕ ПОГОДЫ ==========
    const RAIONS = ["Прикубанский", "Нагорный", "Крылатское", "Черёмушки", "Солнечный", "Советский"];
    const TEMP_OFFSET = {"Прикубанский": 0.5, "Нагорный": -2, "Крылатское": -1, "Черёмушки": 0, "Солнечный": 1.5, "Советский": 0};

    const weatherDB = {
        "2026-05-09": { dayLabel: "СЕГОДНЯ", mainTemp: 22, condition: "Ясно", feelsLike: 21, wind: 3, humidity: 47, high: 24, low: 12, weatherType: "Ясно" },
        "2026-05-10": { dayLabel: "ЗАВТРА", mainTemp: 19, condition: "Небольшой дождь", feelsLike: 18, wind: 4, humidity: 72, high: 21, low: 11, weatherType: "Дождь" },
        "2026-05-11": { dayLabel: "ПОСЛЕЗАВТРА", mainTemp: 16, condition: "Пасмурно", feelsLike: 15, wind: 5, humidity: 78, high: 18, low: 9, weatherType: "Пасмурно" }
    };

    const datesList = Object.keys(weatherDB);
    let currentDateIdx = 0;

    // ========== ЛЕНТА СОБЫТИЙ ==========
    const eventsFeed = [
        { date: "2026-05-09", raion: "Прикубанский", text: "На мясокомбинате Аврелиан слышны выстрелы." },
        { date: "2026-05-09", raion: "Нагорный", text: "Авторынок Приоритет оцеплен." },
        { date: "2026-05-08", raion: "Крылатское", text: "У аэродрома замечено движение." },
        { date: "2026-05-08", raion: "Солнечный", text: "Больница №3 закрыта на карантин." },
        { date: "2026-05-07", raion: "Черёмушки", text: "На рынке видели живого человека." }
    ];
    eventsFeed.sort((a,b) => new Date(b.date) - new Date(a.date));

    // ========== КЕШ ДЛЯ ПОЧАСОВОГО ПРОГНОЗА ==========
    let hourlyCache = {};

    function updateLiveDate() {
        const now = new Date();
        const day = now.getDate().toString().padStart(2,'0');
        const month = (now.getMonth()+1).toString().padStart(2,'0');
        const year = now.getFullYear();
        document.getElementById("liveDate").innerText = `${day}.${month}.${year}`;
    }

    function getWeatherIcon(weatherType) {
        const map = { "Ясно": "☀️", "Небольшой дождь": "🌧️", "Дождь": "🌧️", "Пасмурно": "☁️", "Гроза": "⛈️", "Туман": "🌫️" };
        return map[weatherType] || "🌡️";
    }

    function generateHourlyForecast(baseTemp) {
        const now = new Date();
        const currentHour = now.getHours();
        const hourly = [];
        for (let i = 0; i < 10; i++) {
            let hour = (currentHour + i) % 24;
            let timeLabel = hour.toString().padStart(2, '0') + ":00";
            let tempChange = 0;
            if (hour >= 14 && hour <= 17) tempChange = +2;
            else if (hour >= 22 || hour <= 5) tempChange = -3;
            let temp = Math.round(baseTemp + tempChange);
            let icon = temp < 12 ? "🌧️" : (temp < 18 ? "⛅" : "☀️");
            let rain = temp < 12 ? "70%" : (temp < 18 ? "30%" : "10%");
            hourly.push({ time: timeLabel, temp: temp, icon: icon, rain: rain });
        }
        return hourly;
    }

    function renderHourlyForRaion(raionName, dayData) {
        const cacheKey = `${dayData.mainTemp}_${raionName}`;
        if (hourlyCache[cacheKey]) {
            const cached = hourlyCache[cacheKey];
            document.getElementById("hourlyTitle").innerHTML = `📅 ПОЧАСОВО (${raionName})`;
            document.getElementById("hourlyBlock").classList.remove("hidden");
            document.getElementById("hourlyContainer").innerHTML = cached;
            return;
        }
        const raionTemp = Math.round(dayData.mainTemp + TEMP_OFFSET[raionName]);
        const hourly = generateHourlyForecast(raionTemp);
        const container = document.getElementById("hourlyContainer");
        container.innerHTML = "";
        let html = "";
        for (let h of hourly) {
            html += `
                <div class="hour-card">
                    <div class="hour-time">${h.time}</div>
                    <div class="hour-temp">${h.temp}°</div>
                    <div class="hour-icon">${h.icon}</div>
                    <div class="hour-rain">${h.rain}</div>
                </div>
            `;
        }
        container.innerHTML = html;
        hourlyCache[cacheKey] = html;
        document.getElementById("hourlyTitle").innerHTML = `📅 ПОЧАСОВО (${raionName})`;
        document.getElementById("hourlyBlock").classList.remove("hidden");
    }

    function renderRaions(dayData) {
        const container = document.getElementById("raionsContainer");
        container.innerHTML = "";
        for (let raion of RAIONS) {
            let raionTemp = Math.round(dayData.mainTemp + TEMP_OFFSET[raion]);
            raionTemp = Math.min(raionTemp, dayData.high);
            raionTemp = Math.max(raionTemp, dayData.low);
            const icon = getWeatherIcon(dayData.weatherType);
            const card = document.createElement("div");
            card.className = "raion-card";
            card.innerHTML = `
                <span class="raion-name">${raion}</span>
                <div class="raion-detail">
                    <span class="raion-icon">${icon}</span>
                    <span class="raion-temp">${raionTemp}°</span>
                </div>
            `;
            card.addEventListener("click", () => {
                renderHourlyForRaion(raion, dayData);
            });
            container.appendChild(card);
        }
    }

    function renderEventsFeed() {
        const container = document.getElementById("eventsList");
        if (!eventsFeed.length) {
            container.innerHTML = "<div class='no-events'>📻 Тишина в эфире. Событий пока нет.</div>";
            return;
        }
        container.innerHTML = "";
        eventsFeed.slice(0, 6).forEach(ev => {
            const div = document.createElement("div");
            div.className = "event-item";
            div.innerHTML = `
                <div class="event-icon">📻</div>
                <div class="event-text"><span class="event-raion">${ev.raion}</span> — ${ev.text}</div>
            `;
            container.appendChild(div);
        });
    }

    function renderCurrentDay() {
        const dayData = weatherDB[datesList[currentDateIdx]];
        if (!dayData) return;
        document.getElementById("selectedDate").innerHTML = dayData.dayLabel;
        document.getElementById("mainTemp").innerHTML = dayData.mainTemp + "°";
        document.getElementById("mainCondition").innerHTML = dayData.condition;
        document.getElementById("highLow").innerHTML = `↑${dayData.high}° / ↓${dayData.low}°`;
        document.getElementById("feelsLike").innerHTML = dayData.feelsLike + "°";
        document.getElementById("wind").innerHTML = dayData.wind + " м/с";
        document.getElementById("humidity").innerHTML = dayData.humidity + "%";
        renderRaions(dayData);
        document.getElementById("hourlyBlock").classList.add("hidden");
    }

    document.getElementById("prevDay").addEventListener("click", () => {
        if (currentDateIdx > 0) {
            currentDateIdx--;
            renderCurrentDay();
            hourlyCache = {};
        }
    });
    document.getElementById("nextDay").addEventListener("click", () => {
        if (currentDateIdx < datesList.length - 1) {
            currentDateIdx++;
            renderCurrentDay();
            hourlyCache = {};
        }
    });

    updateLiveDate();
    renderCurrentDay();
    renderEventsFeed();
</script>
</body>
</html>
